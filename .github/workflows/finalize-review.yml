name: Finalize Review Decision

on:
  workflow_dispatch:
    inputs:
      record_id:
        description: "Record ID to finalize"
        required: true
        type: string
      decision:
        description: "Human decision: approve, reject, promote, or weak"
        required: true
        type: string
      source_feedback:
        description: "Source quality feedback: good_source or bad_source (optional)"
        required: false
        type: string
        default: ""
      topic_feedback:
        description: "Topic feedback: expand_this_topic or empty (optional)"
        required: false
        type: string
        default: ""
      notes:
        description: "Optional reviewer notes"
        required: false
        type: string
        default: ""

jobs:
  finalize-review:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Finalize record
        run: |
          set -euo pipefail
          ARGS=("${{ inputs.record_id }}" "${{ inputs.decision }}")
          if [ -n "${{ inputs.source_feedback }}" ]; then
            ARGS+=("--source-feedback" "${{ inputs.source_feedback }}")
          fi
          if [ -n "${{ inputs.topic_feedback }}" ]; then
            ARGS+=("--topic-feedback" "${{ inputs.topic_feedback }}")
          fi
          if [ -n "${{ inputs.notes }}" ]; then
            ARGS+=("--notes" "${{ inputs.notes }}")
          fi
          python scripts/finalize_review.py "${ARGS[@]}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit finalized review if changed
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Finalize review: ${{ inputs.record_id }} (${{ inputs.decision }})"
            # Rebase onto any remote commits that landed after our checkout,
            # then retry the push up to 3 times to handle rare concurrent runs.
            for attempt in 1 2 3; do
              git pull --rebase origin "${{ github.ref_name }}"
              git push origin "HEAD:${{ github.ref_name }}" && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          fi