name: Quant Research Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"

jobs:
  ingest-and-process-quant:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      OPENAI_BASE_URL: https://api.minimax.io/v1
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MINIMAX_MODEL: MiniMax-M2.7
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    concurrency:
      group: quant-pipeline-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run quant pipeline
        run: python scripts/run_quant_pipeline.py --process-workers 2

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated files if changed
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run quant research pipeline"
            pushed_to_main=0
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                pushed_to_main=1
                break
              fi
              echo "Push attempt $i to main failed, retrying..."
              sleep 5
            done

            if [ "$pushed_to_main" -ne 1 ]; then
              backup_branch="automation/${GITHUB_WORKFLOW// /-}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              echo "Could not push to main after retries; pushing to ${backup_branch} to preserve results."
              git push origin "HEAD:refs/heads/${backup_branch}"
              echo "::warning::Unable to push to main. Results were saved to branch ${backup_branch}."
            fi
          fi
