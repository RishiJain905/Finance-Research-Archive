name: Keyword Discovery Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

jobs:
  keyword-discovery:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      OPENAI_BASE_URL: https://api.minimax.io/v1
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MINIMAX_MODEL: MiniMax-M2.7

    concurrency:
      group: keyword-discovery-pipeline
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run keyword discovery
        run: python -m scripts.run_keyword_discovery

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated files if changed
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Run keyword discovery pipeline"
            git pull --rebase origin main
            git push
          fi
