name: Process Finance Record

on:
  workflow_dispatch:
    inputs:
      record_id:
        description: "Record ID to process, for example sample_source"
        required: true
        type: string
  schedule:
    - cron: "0 */12 * * *"

jobs:
  process-record:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      OPENAI_BASE_URL: https://api.minimax.io/v1
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MINIMAX_MODEL: MiniMax-M2.7
      DEFAULT_RECORD_ID: sample_source

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve record id
        id: resolve_record
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "record_id=${{ inputs.record_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "record_id=${DEFAULT_RECORD_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Process record
        run: python scripts/process_record.py "${{ steps.resolve_record.outputs.record_id }}"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated files if changed
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Process finance record: ${{ steps.resolve_record.outputs.record_id }}"
            git push
          fi